services:
  frontend:
    build: 
      context: ./frontend-react
    ports:
      - "3000:80"
    depends_on:
      - rust-api
      - java-api
    restart: unless-stopped

  rust-api:
    build:
      context: ./backend-rust
    env_file:
      - ./backend-rust/.env
    environment:
      APP_ENV: ${APP_ENV:-production}
    ports:
      - "8080:8080"
    restart: unless-stopped

  java-api:
    build:
      context: ./backend-java
    ports:
      - "8081:8081"
    restart: unless-stopped
