apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-api
  namespace: portfolio
  labels:
    app: java-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-api
  template:
    metadata:
      labels:
        app: java-api
    spec:
      containers:
      - name: java-api
        image: ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms128m -Xmx256m"
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: rust-api-secret
              key: GITHUB_TOKEN
              optional: true
        resources:
          requests:
            memory: "192Mi"
            cpu: "50m"
          limits:
            memory: "384Mi"
            cpu: "300m"
---
apiVersion: v1
kind: Service
metadata:
  name: java-api
  namespace: portfolio
spec:
  type: NodePort
  ports:
  - port: 8081
    targetPort: 8081
    nodePort: 30081
    protocol: TCP
  selector:
    app: java-api
