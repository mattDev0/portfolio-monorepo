apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: portfolio
  labels:
    app: blackbox-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: blackbox-exporter
        image: prom/blackbox-exporter:v0.25.0
        imagePullPolicy: Always
        ports:
        - containerPort: 9115
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
            add: ["NET_RAW"]
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "64Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: blackbox-exporter
  namespace: portfolio
spec:
  ports:
  - port: 9115
    targetPort: 9115
    protocol: TCP
  selector:
    app: blackbox-exporter
