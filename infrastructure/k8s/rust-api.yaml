apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-api
  namespace: portfolio
  labels:
    app: rust-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust-api
  template:
    metadata:
      labels:
        app: rust-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: rust-api
        image: ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:latest
        imagePullPolicy: Always
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: APP_ENV
          value: "production"
        - name: PROMETHEUS_URL
          value: "http://devops-prometheus.devops.svc.cluster.local:9090"
        - name: CORS_ALLOWED_ORIGIN
          value: "https://mattdev0.tech"
        envFrom:
        - secretRef:
            name: rust-api-secret
            optional: true
        resources:
          requests:
            memory: "16Mi"
            cpu: "10m"
          limits:
            memory: "32Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: rust-api
  namespace: portfolio
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
    protocol: TCP
  selector:
    app: rust-api
