apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-api
  namespace: portfolio
  labels:
    app: java-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-api
  template:
    metadata:
      labels:
        app: java-api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: java-api
        image: ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:latest
        imagePullPolicy: Always
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        ports:
        - containerPort: 8081
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        startupProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          failureThreshold: 30
          periodSeconds: 5
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        env:
        - name: JAVA_TOOL_OPTIONS
          value: "-Xms128m -Xmx256m"
        - name: CORS_ALLOWED_ORIGINS
          value: "https://mattdev0.tech"
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: rust-api-secret
              key: GITHUB_TOKEN
              optional: true
        resources:
          requests:
            memory: "192Mi"
            cpu: "50m"
          limits:
            memory: "384Mi"
            cpu: "300m"
      volumes:
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: java-api
  namespace: portfolio
spec:
  type: NodePort
  ports:
  - port: 8081
    targetPort: 8081
    nodePort: 30081
    protocol: TCP
  selector:
    app: java-api
