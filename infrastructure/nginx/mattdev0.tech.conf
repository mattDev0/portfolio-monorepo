server {
    server_name mattdev0.tech www.mattdev0.tech;

    # Route to React Frontend (NodePort 30000)
    location / {
        proxy_pass http://localhost:30000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Route to Rust Engine (NodePort 30080)
    location /api/status {
        proxy_pass http://127.0.0.1:30080;
    }

    location /api/spotify {
        proxy_pass http://127.0.0.1:30080;
    }

    # Route to Java Engine (NodePort 30081)
    location /api/infrastructure {
        proxy_pass http://127.0.0.1:30081;
    }

    location /api/github {
        proxy_pass http://127.0.0.1:30081;
    }

    # Include DevOps Control Center routes
    include /etc/nginx/snippets/devops-locations.conf;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mattdev0.tech/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mattdev0.tech/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.mattdev0.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = mattdev0.tech) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name mattdev0.tech www.mattdev0.tech;
    return 404; # managed by Certbot
}
