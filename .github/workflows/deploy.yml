name: Production Deployment

# Trigger the workflow only when pushing to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Executing Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          script: |
            echo "Successfully connected to Azure Production Server."
            
            # Navigate to your monorepo directory
            cd ~/portfolio-monorepo
            
            # Ensure the server is locked to the correct branch and fetch the latest code
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            # 1. THE PERMANENT FIX: Always wipe the slate clean to prevent zombie ports
            sudo docker-compose down
            
            # 2. Boot the new cluster
            sudo docker-compose up -d --build
            
            # Prune dangling layers to prevent the server disk from filling up over time
            sudo docker image prune -f
            
            echo "Deployment successfully executed!"