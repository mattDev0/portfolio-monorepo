name: Production Deployment

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '**/README.md'
      - 'HELP.md'
  # CHANGE: Allow manual triggering from GitHub UI or CLI
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images even if code has not changed'
        required: false
        type: boolean
        default: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # CHANGE: Need full history to compute per-component SHAs
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-react/package-lock.json'
      
      - name: Run Frontend Tests
        working-directory: ./frontend-react
        run: |
          npm ci
          npm run test

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Java Tests
        working-directory: ./backend-java
        run: ./mvnw test

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend-rust

      - name: Run Rust Tests
        working-directory: ./backend-rust
        run: cargo test

      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Run Kubeconform Validation
        run: kubeconform -strict -ignore-filename-pattern kustomization.yaml infrastructure/k8s/*.yaml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # CHANGE: Need full history to compute per-component SHAs
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # CHANGE: Compute the SHA of the last commit that touched each component.
      # This means unchanged components get their previous build's tag, not $GITHUB_SHA.
      - name: Compute Component SHAs
        id: shas
        run: |
          FRONTEND_SHA=$(git log -1 --format=%H -- frontend-react/ infrastructure/k8s/frontend.yaml)
          JAVA_SHA=$(git log -1 --format=%H -- backend-java/ infrastructure/k8s/java-api.yaml)
          RUST_SHA=$(git log -1 --format=%H -- backend-rust/ infrastructure/k8s/rust-api.yaml)
          echo "frontend_sha=$FRONTEND_SHA" >> $GITHUB_OUTPUT
          echo "java_sha=$JAVA_SHA" >> $GITHUB_OUTPUT
          echo "rust_sha=$RUST_SHA" >> $GITHUB_OUTPUT
          echo "Frontend SHA: $FRONTEND_SHA"
          echo "Java SHA: $JAVA_SHA"
          echo "Rust SHA: $RUST_SHA"

      # CHANGE: Check if images already exist in the registry.
      # If they do, skip building. If they don't (rollback, pruned), rebuild.
      - name: Check Existing Images
        id: check
        run: |
          check_image() {
            local image=$1
            local tag=$2
            if docker manifest inspect "ghcr.io/mattdev0/portfolio-monorepo/${image}:${tag}" > /dev/null 2>&1; then
              echo "true"
            else
              echo "false"
            fi
          }

          FORCE="${{ inputs.force_rebuild }}"

          if [ "$FORCE" == "true" ]; then
            echo "frontend_exists=false" >> $GITHUB_OUTPUT
            echo "java_exists=false" >> $GITHUB_OUTPUT
            echo "rust_exists=false" >> $GITHUB_OUTPUT
            echo "Force rebuild requested — all images will be rebuilt."
          else
            FRONTEND_EXISTS=$(check_image "portfolio-frontend" "${{ steps.shas.outputs.frontend_sha }}")
            JAVA_EXISTS=$(check_image "portfolio-java-api" "${{ steps.shas.outputs.java_sha }}")
            RUST_EXISTS=$(check_image "portfolio-rust-api" "${{ steps.shas.outputs.rust_sha }}")
            echo "frontend_exists=$FRONTEND_EXISTS" >> $GITHUB_OUTPUT
            echo "java_exists=$JAVA_EXISTS" >> $GITHUB_OUTPUT
            echo "rust_exists=$RUST_EXISTS" >> $GITHUB_OUTPUT
            echo "Frontend image exists: $FRONTEND_EXISTS"
            echo "Java image exists: $JAVA_EXISTS"
            echo "Rust image exists: $RUST_EXISTS"
          fi

      - name: Build and Push Portfolio Frontend
        if: steps.check.outputs.frontend_exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          push: true
          tags: |
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend:${{ steps.shas.outputs.frontend_sha }}
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Portfolio Frontend Image
        if: steps.check.outputs.frontend_exists == 'false'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend:${{ steps.shas.outputs.frontend_sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Build and Push Portfolio Java API
        if: steps.check.outputs.java_exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./backend-java
          push: true
          tags: |
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:${{ steps.shas.outputs.java_sha }}
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Portfolio Java Image
        if: steps.check.outputs.java_exists == 'false'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:${{ steps.shas.outputs.java_sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Build and Push Portfolio Rust API
        if: steps.check.outputs.rust_exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./backend-rust
          push: true
          tags: |
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:${{ steps.shas.outputs.rust_sha }}
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Portfolio Rust Image
        if: steps.check.outputs.rust_exists == 'false'
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:${{ steps.shas.outputs.rust_sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      # CHANGE: Always pass all three SHAs. Deployment is deterministic.
      - name: Executing Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_SHA: ${{ steps.shas.outputs.frontend_sha }}
          JAVA_SHA: ${{ steps.shas.outputs.java_sha }}
          RUST_SHA: ${{ steps.shas.outputs.rust_sha }}
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          envs: FRONTEND_SHA,JAVA_SHA,RUST_SHA
          script: |
            set -e
            echo "Successfully connected to Azure Production Server."
            
            # Navigate to your monorepo directory
            cd ~/portfolio-monorepo
            
            # Ensure the server is locked to the correct branch and fetch the latest code
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            echo "Applying namespaces..."
            sudo kubectl apply -f infrastructure/k8s/namespace.yaml
            
            echo "Configuring environment secrets..."
            if [ -f ./backend-rust/.env ]; then
              sudo kubectl create secret generic rust-api-secret \
                --from-env-file=./backend-rust/.env \
                -n portfolio \
                --dry-run=client -o yaml | sudo kubectl apply -f -
            fi
            
            echo "Deploying applications with Kustomize..."
            if ! command -v kustomize &> /dev/null; then
                echo "Installing kustomize v5.4.3..."
                curl -sLO "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
                echo "e189ce4fedff3a3e61ea8f5fae4a7fd079f3e42284c9b91e186ef5a21e4a205e  kustomize_v5.4.3_linux_amd64.tar.gz" | sha256sum -c -
                tar xzf kustomize_v5.4.3_linux_amd64.tar.gz
                sudo mv kustomize /usr/local/bin/
                rm kustomize_v5.4.3_linux_amd64.tar.gz
            fi
            
            cd infrastructure/k8s
            
            # CHANGE: Always set all three image tags deterministically
            kustomize edit set image ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend=ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend:$FRONTEND_SHA
            kustomize edit set image ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api=ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:$JAVA_SHA
            kustomize edit set image ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api=ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:$RUST_SHA
            
            kustomize build . | sudo kubectl apply -f -
            
            echo "Waiting for rollouts to complete..."
            sudo kubectl rollout status deployment/frontend -n portfolio --timeout=300s || (sudo kubectl rollout undo deployment/frontend -n portfolio && exit 1)
            sudo kubectl rollout status deployment/java-api -n portfolio --timeout=300s || (sudo kubectl rollout undo deployment/java-api -n portfolio && exit 1)
            sudo kubectl rollout status deployment/rust-api -n portfolio --timeout=300s || (sudo kubectl rollout undo deployment/rust-api -n portfolio && exit 1)
            
            # Prune docker images to save space
            sudo docker image prune -f
            
            echo "K8s Deployment successfully executed!"