name: Production Deployment

# Trigger the workflow only when pushing to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Executing Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          script: |
            set -e
            echo "Successfully connected to Azure Production Server."
            
            # Navigate to your monorepo directory
            cd ~/portfolio-monorepo
            
            # Ensure the server is locked to the correct branch and fetch the latest code
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            echo "Building Docker images locally..."
            sudo docker build -t portfolio-frontend:latest ./frontend-react
            sudo docker build -t portfolio-java-api:latest ./backend-java
            sudo docker build -t portfolio-rust-api:latest ./backend-rust
            
            echo "Importing images into K3s..."
            sudo docker save portfolio-frontend:latest -o /tmp/portfolio-frontend.tar && sudo k3s ctr images import /tmp/portfolio-frontend.tar && sudo rm -f /tmp/portfolio-frontend.tar
            sudo docker save portfolio-java-api:latest -o /tmp/portfolio-java-api.tar && sudo k3s ctr images import /tmp/portfolio-java-api.tar && sudo rm -f /tmp/portfolio-java-api.tar
            sudo docker save portfolio-rust-api:latest -o /tmp/portfolio-rust-api.tar && sudo k3s ctr images import /tmp/portfolio-rust-api.tar && sudo rm -f /tmp/portfolio-rust-api.tar
            
            echo "Applying namespaces..."
            sudo kubectl apply -f k8s/namespace.yaml
            
            echo "Configuring environment secrets..."
            if [ -f ./backend-rust/.env ]; then
              sudo kubectl create secret generic rust-api-secret \
                --from-env-file=./backend-rust/.env \
                -n portfolio \
                --dry-run=client -o yaml | sudo kubectl apply -f -
            fi
            
            echo "Deploying applications to K3s..."
            sudo kubectl apply -f k8s/frontend.yaml
            sudo kubectl apply -f k8s/java-api.yaml
            sudo kubectl apply -f k8s/rust-api.yaml
            
            echo "Triggering rolling restart to pick up new images..."
            sudo kubectl rollout restart deployment/frontend deployment/java-api deployment/rust-api -n portfolio
            
            # Prune docker images to save space
            sudo docker image prune -f
            
            echo "K8s Deployment successfully executed!"