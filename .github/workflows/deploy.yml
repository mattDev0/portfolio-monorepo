name: Production Deployment

# Trigger the workflow only when pushing to the main branch
on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '**/README.md'
      - 'HELP.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend-react/package-lock.json'
      
      - name: Run Frontend Tests
        working-directory: ./frontend-react
        run: |
          npm ci
          npm run test

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Java Tests
        working-directory: ./backend-java
        run: ./mvnw test

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Set up Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./backend-rust

      - name: Run Rust Tests
        working-directory: ./backend-rust
        run: cargo test

      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Run Kubeconform Validation
        run: kubeconform -strict -ignore-filename-pattern kustomization.yaml infrastructure/k8s/*.yaml

  deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Paths Filter
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend-react/**'
              - 'infrastructure/k8s/frontend.yaml'
            java:
              - 'backend-java/**'
              - 'infrastructure/k8s/java-api.yaml'
            rust:
              - 'backend-rust/**'
              - 'infrastructure/k8s/rust-api.yaml'

      - name: Build and Push Portfolio Frontend
        if: steps.filter.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend-react
          push: true
          tags: |
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend:${{ github.sha }}
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Portfolio Frontend Image
        if: steps.filter.outputs.frontend == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Build and Push Portfolio Java API
        if: steps.filter.outputs.java == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend-java
          push: true
          tags: |
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:${{ github.sha }}
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Portfolio Java Image
        if: steps.filter.outputs.java == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Build and Push Portfolio Rust API
        if: steps.filter.outputs.rust == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend-rust
          push: true
          tags: |
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:${{ github.sha }}
            ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Portfolio Rust Image
        if: steps.filter.outputs.rust == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL'

      - name: Executing Remote SSH Commands to Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          FRONTEND_CHANGED: ${{ steps.filter.outputs.frontend }}
          JAVA_CHANGED: ${{ steps.filter.outputs.java }}
          RUST_CHANGED: ${{ steps.filter.outputs.rust }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          port: 22
          envs: FRONTEND_CHANGED,JAVA_CHANGED,RUST_CHANGED,GITHUB_SHA
          script: |
            set -e
            echo "Successfully connected to Azure Production Server."
            
            # Navigate to your monorepo directory
            cd ~/portfolio-monorepo
            
            # Ensure the server is locked to the correct branch and fetch the latest code
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            echo "Applying namespaces..."
            sudo kubectl apply -f infrastructure/k8s/namespace.yaml
            
            echo "Configuring environment secrets..."
            if [ -f ./backend-rust/.env ]; then
              sudo kubectl create secret generic rust-api-secret \
                --from-env-file=./backend-rust/.env \
                -n portfolio \
                --dry-run=client -o yaml | sudo kubectl apply -f -
            fi
            
            echo "Deploying applications with Kustomize..."
            if ! command -v kustomize &> /dev/null; then
                echo "Installing kustomize..."
                curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh"  | bash
                sudo mv kustomize /usr/local/bin/
            fi
            
            cd infrastructure/k8s
            if [ "$FRONTEND_CHANGED" == "true" ]; then
              kustomize edit set image ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend=ghcr.io/mattdev0/portfolio-monorepo/portfolio-frontend:$GITHUB_SHA
            fi
            if [ "$JAVA_CHANGED" == "true" ]; then
              kustomize edit set image ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api=ghcr.io/mattdev0/portfolio-monorepo/portfolio-java-api:$GITHUB_SHA
            fi
            if [ "$RUST_CHANGED" == "true" ]; then
              kustomize edit set image ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api=ghcr.io/mattdev0/portfolio-monorepo/portfolio-rust-api:$GITHUB_SHA
            fi
            
            kustomize build . | sudo kubectl apply -f -
            
            echo "Waiting for rollouts to complete..."
            sudo kubectl rollout status deployment/frontend -n portfolio --timeout=300s || (sudo kubectl rollout undo deployment/frontend -n portfolio && exit 1)
            sudo kubectl rollout status deployment/java-api -n portfolio --timeout=300s || (sudo kubectl rollout undo deployment/java-api -n portfolio && exit 1)
            sudo kubectl rollout status deployment/rust-api -n portfolio --timeout=300s || (sudo kubectl rollout undo deployment/rust-api -n portfolio && exit 1)
            
            # Prune docker images to save space
            sudo docker image prune -f
            
            echo "K8s Deployment successfully executed!"